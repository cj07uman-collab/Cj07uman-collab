<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Homepage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 60px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 40px 30px;
            text-align: center;
        }
        h1 {
            color: #2d3a4b;
        }
        p {
            color: #555;
            font-size: 1.2em;
        }
        .footer {
            margin-top: 40px;
            color: #aaa;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My First Homepage!</h1>
        <p>This is a simple, modern homepage created as your starting point. You can edit this file to add more content, images, or links as you like.</p>
        <div class="footer">&copy; 2026 My First Homepage</div>
    </div>
</body>
</html>
